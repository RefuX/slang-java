name: Qodana

# IntelliJ IDEA code inspections (see qodana.yaml) on push/PR. Catches the IDE-only checks that
# javac -Xlint cannot — e.g. AutoCloseable-without-try-with-resources — and surfaces results in
# the PR and the Actions summary. Deliberate exceptions carry @SuppressWarnings in code.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to annotate PRs with findings
      checks: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Qodana uses history for baseline / new-code detection

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }} # optional; only needed to upload to Qodana Cloud
