name: Release

# Push a tag like v0.0.1 to release. This uploads both io.github.refux:slang-java and
# io.github.refux:slang-java-natives (one classifier artifact per platform) to the Maven Central
# Portal as a *pending deployment* and creates the matching GitHub Release.
#
# MANUAL GATE: the deployment is NOT auto-released — review it at https://central.sonatype.com
# (Deployments) and click Publish (or Drop). Once a release is trusted, switch the publish step
# below to `publishAndReleaseToMavenCentral` to auto-release future tags.
#
# The tag must match `version` in gradle.properties (tag v0.0.1 → version=0.0.1).
#
# Required repository secrets (same set as slang-wasm-endive):
#   MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD — Central Portal token
#   SIGNING_KEY / SIGNING_PASSWORD — in-memory GPG key for artifact signing
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out slang-java
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Fetch every platform's payload — needed for the natives classifier jars and to run the
      # tests (which use the host's, linux-x86_64, payload).
      - name: Download pinned Slang natives (all platforms)
        run: ./gradlew :natives:downloadNatives -PnativesPlatform=all --console=plain

      # Gate the release on the smoke/golden suite against the pinned official binaries.
      - name: Run tests
        run: ./gradlew :slang:test "-PslangNativesDir=natives/build/payload/linux-x86_64/lib" --console=plain

      # Uploads io.github.refux:slang-java and io.github.refux:slang-java-natives (all
      # per-platform classifier jars) to the Central Portal as a pending deployment. Manually
      # review and Publish it in the Portal UI (see the header note).
      - name: Upload to Maven Central (pending deployment — manual publish)
        run: ./gradlew publishToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          slang/build/libs/*.jar
          natives/build/libs/slang-java-natives-*-{linux,macos,windows}-*.jar
