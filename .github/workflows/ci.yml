name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  smoke:
    name: smoke (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-x86_64, runner: ubuntu-latest }
          - { platform: linux-aarch64, runner: ubuntu-24.04-arm }
          - { platform: windows-x86_64, runner: windows-latest }
          - { platform: macos-aarch64, runner: macos-15 }
          # Best-effort platform (shrinking Intel runner pool) — DESIGN.md §16 M0.
          - { platform: macos-x86_64, runner: macos-15-intel, experimental: true }
          # windows-aarch64 is deliberately not in CI for now: Temurin publishes no JDK 25
          # for windows-arm (setup-java fails before the tests run). Zulu does ship one if
          # this platform is ever wanted — see DESIGN.md §12.
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v7

      # Runs Gradle and satisfies the JDK 25 toolchain the build requests (DESIGN.md §10);
      # the foojay resolver would auto-provision it otherwise.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v6

      - name: Download pinned Slang natives (verified against committed manifest)
        run: ./gradlew :natives:downloadNatives --console=plain

      - name: Smoke test — C export path vs COM vtable path must agree
        run: >
          ./gradlew :slang:test
          "-PslangNativesDir=natives/build/payload/${{ matrix.platform }}/lib"
          --console=plain
